name: Lint, Format & Build

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  lint-format-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Format
        run: yarn format --check

      - name: Lint
        run: yarn lint

      - name: Stylelint
        run: yarn stylelint

      - name: Build
        run: yarn build
