version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VIRTUAL_HOST=repetitmeweb.ru
      - LETSENCRYPT_HOST=repetitmeweb.ru
      - LETSENCRYPT_EMAIL=mail@repetitmeweb.ru
    networks:
      - reverse-proxy
    restart: always

networks:
  reverse-proxy:
    external: true
